<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discount Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { background: #fdf8f5; font-family: 'Segoe UI', sans-serif; padding: 2rem 0; }
    .card { border-radius: 1.5rem; border: none; box-shadow: 0 12px 28px rgba(0,0,0,0.06); }
    .final-price { font-size: 3rem; font-weight: 800; color: #c44f1c; }
    .savings-badge { background: #d4edda; color: #155724; border-radius: 2rem; padding: 0.3rem 1rem; }
  </style>
</head>
<body>
<div class="container" style="max-width: 460px;">
  <div class="card p-4">
    <h5 class="fw-bold"><i class="bi bi-tags-fill me-2"></i>Discount Calculator</h5>
    
    <label class="form-label">Original Price ($)</label>
    <input type="number" class="form-control mb-3" id="originalPrice" value="100" min="0" step="0.01">

    <label class="form-label">Discount (%)</label>
    <div class="input-group mb-3">
      <input type="number" class="form-control" id="discountPercent" value="20" min="0" max="100">
      <span class="input-group-text">%</span>
    </div>

    <label class="form-label">Sales Tax (%)</label>
    <div class="input-group mb-3">
      <input type="number" class="form-control" id="salesTax" value="8.5" min="0" step="0.1">
      <span class="input-group-text">%</span>
    </div>

    <div class="bg-light rounded-4 p-3 text-center">
      <div class="text-muted small">You Pay</div>
      <div class="final-price" id="finalPrice">$86.80</div>
      <span class="savings-badge" id="savings">You save $20.00</span>
      <hr class="my-2">
      <div class="d-flex justify-content-between small"><span>Discount amount</span><span id="discountAmount">-$20.00</span></div>
      <div class="d-flex justify-content-between small"><span>Tax added</span><span id="taxAmount">+$6.80</span></div>
    </div>
  </div>
</div>

<script>
  function calculate() {
    const price = parseFloat(document.getElementById('originalPrice').value) || 0;
    const discountPct = parseFloat(document.getElementById('discountPercent').value) || 0;
    const taxPct = parseFloat(document.getElementById('salesTax').value) || 0;

    const discountAmount = price * (discountPct / 100);
    const afterDiscount = price - discountAmount;
    const taxAmount = afterDiscount * (taxPct / 100);
    const final = afterDiscount + taxAmount;

    document.getElementById('finalPrice').textContent = `$${final.toFixed(2)}`;
    document.getElementById('savings').textContent = `You save $${discountAmount.toFixed(2)}`;
    document.getElementById('discountAmount').textContent = `-$${discountAmount.toFixed(2)}`;
    document.getElementById('taxAmount').textContent = `+$${taxAmount.toFixed(2)}`;
  }

  ['originalPrice', 'discountPercent', 'salesTax'].forEach(id => 
    document.getElementById(id).addEventListener('input', calculate)
  );
  calculate();
</script>
</body>
</html>
